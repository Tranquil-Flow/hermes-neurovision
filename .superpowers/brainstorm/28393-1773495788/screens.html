<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Neurovision — Screen Designs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #c0c0d0; font-family: 'SF Mono','Fira Code','JetBrains Mono','Courier New',monospace; padding: 24px; min-height: 100vh; padding-bottom: 56px; }
  h1 { color: #7eb8ff; font-size: 18px; letter-spacing: .1em; margin-bottom: 6px; text-transform: uppercase; }
  .subtitle { color: #445; font-size: 12px; margin-bottom: 8px; letter-spacing: .05em; }
  .instructions { font-size: 12px; color: #445; letter-spacing: .05em; margin-bottom: 24px; }
  .instructions em { color: #7eb8ff; font-style: normal; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px,1fr)); gap: 20px; }
  .screen-card { border: 1px solid #1a1a2e; border-radius: 6px; overflow: hidden; cursor: pointer; transition: border-color .2s, transform .15s; position: relative; }
  .screen-card:hover { border-color: #3a3a5e; transform: translateY(-2px); }
  .screen-card.selected { border-color: #7eb8ff; box-shadow: 0 0 20px rgba(126,184,255,.15); }
  .sel-badge { display: none; position: absolute; top: 8px; right: 8px; background: #7eb8ff; color: #0a0a0f; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 3px; letter-spacing: .1em; z-index: 10; }
  .screen-card.selected .sel-badge { display: block; }
  .screen-header { background: #0e0e1a; padding: 8px 12px; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 10px; }
  .dots { display: flex; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }
  .stitle { font-size: 11px; color: #556; letter-spacing: .08em; flex: 1; text-align: center; }
  .stag { font-size: 10px; color: #4a6; letter-spacing: .05em; }
  canvas { display: block; width: 100%; }
  .sdesc { padding: 10px 12px; background: #0a0a0f; border-top: 1px solid #1a1a2e; }
  .sdesc h3 { font-size: 12px; color: #9ab; margin-bottom: 4px; letter-spacing: .06em; }
  .sdesc p { font-size: 11px; color: #445; line-height: 1.5; }
  .tagrow { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 2px; background: #111122; color: #556; border: 1px solid #1a1a2e; }
  .nbadge { display: inline-block; font-size: 9px; padding: 1px 5px; background: #1a3a1a; color: #4a8; border: 1px solid #2a5a2a; border-radius: 2px; margin-left: 6px; vertical-align: middle; letter-spacing: .05em; }
  .ibadge { display: inline-block; font-size: 9px; padding: 1px 5px; background: #1a1a3a; color: #68a; border: 1px solid #2a2a5a; border-radius: 2px; margin-left: 6px; vertical-align: middle; letter-spacing: .05em; }
  #bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0e0e1a; border-top: 1px solid #1a1a2e; padding: 10px 24px; display: flex; align-items: center; gap: 16px; font-size: 12px; color: #556; }
  #bar-count { color: #7eb8ff; }
  #bar-names { color: #445; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #confirm { margin-left: auto; background: #7eb8ff; color: #0a0a0f; border: none; padding: 6px 16px; border-radius: 4px; font-family: inherit; font-size: 11px; font-weight: bold; letter-spacing: .08em; cursor: pointer; display: none; }
  #confirm:hover { background: #a0d0ff; }
</style>
</head>
<body>

<h1>Hermes Neurovision — Screen Designs</h1>
<p class="subtitle">10 screens: 5 original concepts + 5 new ideas</p>
<p class="instructions">Click screens to select which to build — <em>click to toggle</em></p>

<div class="grid" id="grid"></div>

<div id="bar">
  <span id="bar-count">0 selected</span>
  <span id="bar-names"></span>
  <button id="confirm">Confirm Selection →</button>
</div>

<script>
const sin=Math.sin,cos=Math.cos,sqrt=Math.sqrt,atan2=Math.atan2,PI=Math.PI,
      floor=Math.floor,abs=Math.abs,max=Math.max,min=Math.min;
function clamp(v,lo,hi){return max(lo,min(hi,v));}
function hsv(h,s,v){
  h=((h%1)+1)%1;
  const i=floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  const m=[[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i%6];
  return [m[0]*255,m[1]*255,m[2]*255];
}
function px(d,i,r,g,b){d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;}

const SCREENS=[
{id:'synaptic-plasma',title:'Synaptic Plasma',tag:'ORIGINAL',badge:'',
 desc:'Full-screen plasma interference field. No nodes or edges — pure wave topology. Overlapping sines create organic moire that breathes with agent activity.',
 tags:['full-field','plasma','no-graph','breathes'],
 draw(ctx,W,H,t){
  const id=ctx.createImageData(W,H);const d=id.data;
  const cx=W/2,cy=H/2;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const dx=x-cx,dy=y-cy;
    const dist=sqrt(dx*dx+dy*dy*2.5);
    const fr=0.09+0.03*sin(t*0.3);
    const v=(sin(x*fr+t*1.2)+sin(y*fr*1.4-t*.8)+sin((x+y)*fr*.7+t*.5)+sin(dist*.18-t*2))/4;
    const n=(v+1)/2;
    const hue=0.55+0.15*sin(t*0.2+dist*0.005);
    const [r,g,b]=hsv(hue,0.7+0.3*n,0.05+0.95*n);
    px(d,(y*W+x)*4,r,g,b);
  }
  ctx.putImageData(id,0,0);
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(200,220,255,.8)';
  ctx.fillText('☿ hermes · ⚡ ACTIVE · opus · tok:12.4k · mem:12',8,H-8);
 }
},

{id:'oracle',title:'The Oracle',tag:'ORIGINAL',badge:'',
 desc:'Rotating vortex tunnel viewed head-on. Entire space spirals inward. Rotation speed equals agent activity. Tool calls send data glyphs flying inward.',
 tags:['vortex','tunnel','rotation','depth'],
 draw(ctx,W,H,t){
  const id=ctx.createImageData(W,H);const d=id.data;
  const cx=W/2,cy=H/2;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const dx=(x-cx)/cx,dy=(y-cy)/cy;
    const dist=sqrt(dx*dx+dy*dy*2);
    const angle=atan2(dy,dx);
    const twist=4.5+2*sin(t*0.15);
    const vx=sin(dist*8+angle*twist-t*1.8);
    const tn=sin(1/(dist*1.2+.08)*8-t*3.5);
    const v=clamp((vx*.6+tn*.4+1)/2,0,1);
    const glow=max(0,1-dist*2.5);
    const n=clamp(v+glow*.4,0,1);
    const hue=0.65+.2*(angle/(2*PI))+t*.03;
    const [r,g,b]=hsv(hue,.8,.1+.9*n);
    px(d,(y*W+x)*4,r,g,b);
  }
  ctx.putImageData(id,0,0);
  const g2=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,18);
  g2.addColorStop(0,'rgba(200,255,255,.9)');g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2;ctx.beginPath();ctx.arc(W/2,H/2,18,0,PI*2);ctx.fill();
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.7)';
  ctx.fillText('☿ oracle · rotating · 93 steps · opus',8,H-8);
 }
},

{id:'cellular-cortex',title:'Cellular Cortex',tag:'ORIGINAL',badge:'',
 desc:'Voronoi tessellation — each cell is one agent module (memory, tools, cron, aegis). Cells breathe independently. Borders flare when modules fire. Data particles stream between cells.',
 tags:['voronoi','modules','cells','structured'],
 draw(ctx,W,H,t){
  const mods=[
   {n:'∿ memory\n  12 stored', x:.18,y:.28,h:.55,p:0},
   {n:'☿ model\n  opus-4.6',  x:.50,y:.20,h:.62,p:.7},
   {n:'⚙ tools\n  calls:847', x:.82,y:.28,h:.45,p:1.4},
   {n:'⏱ cron\n  14:32',      x:.22,y:.72,h:.38,p:2.1},
   {n:'◎ core\n  session',    x:.50,y:.55,h:.58,p:.35},
   {n:'⚡ aegis\n  threats:0', x:.78,y:.72,h:.08,p:2.8},
  ];
  const id=ctx.createImageData(W,H);const d=id.data;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
   const nx=x/W,ny=y/H;
   let bd=1e9,b2=1e9,bi=0;
   for(let i=0;i<mods.length;i++){
    const m=mods[i];const dd=(nx-m.x)**2*1.5+(ny-m.y)**2;
    if(dd<bd){b2=bd;bd=dd;bi=i;}else if(dd<b2)b2=dd;
   }
   const edge=sqrt(b2)-sqrt(bd);
   const m=mods[bi];
   const pulse=.4+.6*sin(t*1.2+m.p);
   if(edge<.025){
    const bright=.3+.7*pulse*(edge/.025);
    const [r,g,b2]=hsv(m.h,.7,bright);px(d,(y*W+x)*4,r,g,b2);
   }else{
    const fill=clamp(.03+.08*sin(sqrt(bd)*30-t*.8+m.p)*pulse,0,.15);
    const [r,g,b2]=hsv(m.h,.5,fill);px(d,(y*W+x)*4,r,g,b2);
   }
  }
  ctx.putImageData(id,0,0);
  ctx.font='9px monospace';
  for(const m of mods){
   const ppx=m.x*W,ppy=m.y*H;
   const pulse=.4+.6*sin(t*1.2+m.p);
   const [r,g,b]=hsv(m.h,.6,.7+.3*pulse);
   ctx.fillStyle='rgb('+[r,g,b].map(v=>v|0).join(',')+')';
   m.n.split('\n').forEach((ln,i)=>ctx.fillText(ln,ppx-26,ppy-5+i*11));
  }
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.6)';
  ctx.fillText('☿ cellular cortex · 6 modules · live',8,H-8);
 }
},

{id:'reaction-field',title:'Reaction Field',tag:'ORIGINAL',badge:'',
 desc:'Gray-Scott reaction-diffusion. Organic chemistry grows and morphs continuously. Agent events seed new chemical gradients. Security events create invasion patterns.',
 tags:['gray-scott','chemistry','organic','self-organizing'],
 _u:null,_v:null,_sw:0,
 draw(ctx,W,H,t){
  const sw=floor(W/3),sh=floor(H/3);
  if(!this._u||this._sw!==sw){
   this._sw=sw;
   this._u=new Float32Array(sw*sh).fill(1);
   this._v=new Float32Array(sw*sh).fill(0);
   for(let i=0;i<12;i++){
    const cx2=floor(((i*7+1)%sw)),cy2=floor(((i*13+3)%sh));
    for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){
     const px2=cx2+dx,py2=cy2+dy;
     if(px2>=0&&px2<sw&&py2>=0&&py2<sh){this._u[py2*sw+px2]=.5;this._v[py2*sw+px2]=.25;}
    }
   }
  }
  const u=this._u,v=this._v;
  const F=.037,k=.060,Du=.16,Dv=.08;
  const nu=new Float32Array(sw*sh),nv=new Float32Array(sw*sh);
  for(let s=0;s<4;s++){
   for(let y=0;y<sh;y++)for(let x=0;x<sw;x++){
    const i=y*sw+x;
    const il=y*sw+((x-1+sw)%sw),ir=y*sw+((x+1)%sw);
    const iu=((y-1+sh)%sh)*sw+x,id2=((y+1)%sh)*sw+x;
    const lu=u[il]+u[ir]+u[iu]+u[id2]-4*u[i];
    const lv=v[il]+v[ir]+v[iu]+v[id2]-4*v[i];
    const uvv=u[i]*v[i]*v[i];
    nu[i]=clamp(u[i]+Du*lu-uvv+F*(1-u[i]),0,1);
    nv[i]=clamp(v[i]+Dv*lv+uvv-(F+k)*v[i],0,1);
   }
   u.set(nu);v.set(nv);
  }
  const id=ctx.createImageData(W,H);const dat=id.data;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
   const vi=v[floor(y/3)*sw+floor(x/3)];
   const [r,g,b]=hsv(.55+vi*.3,.8,clamp(vi*3,0,1));
   px(dat,(y*W+x)*4,r,g,b);
  }
  ctx.putImageData(id,0,0);
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.6)';
  ctx.fillText('☿ reaction field · F=0.037 k=0.060 · self-organizing',8,H-8);
 }
},

{id:'stellar-weave',title:'Stellar Memory Weave',tag:'ORIGINAL',badge:'',
 desc:'Every agent memory becomes a named persistent star drifting on smooth noise. Stars form constellations. Tool calls fire as shooting star packets. Session core pulses at center.',
 tags:['stars','memory','constellation','drift'],
 _stars:null,
 draw(ctx,W,H,t){
  if(!this._stars){
   const names=['rust lifetimes','async patterns','memory design','hooks system','tool patterns','agent lifecycle','project structure','error handling','type safety','concurrency'];
   this._stars=names.map((n,i)=>({n,x:.1+.8*(sin(i*2.39)*.5+.5),y:.15+.7*(cos(i*1.73)*.5+.5),ph:i*.7}));
  }
  ctx.fillStyle='#040408';ctx.fillRect(0,0,W,H);
  for(let i=0;i<60;i++){
   ctx.fillStyle='rgba(180,200,255,'+(0.08+.1*sin(t*.5+i))+')';
   ctx.fillRect((i*7.3+19)%W,(i*13.7+31)%H,1,1);
  }
  this._stars.forEach(s=>{
   s.x=clamp(s.x+.0002*sin(t*.3+s.ph*1.1),.05,.95);
   s.y=clamp(s.y+.0001*cos(t*.25+s.ph*.9),.05,.95);
  });
  ctx.strokeStyle='rgba(80,120,200,.2)';ctx.lineWidth=.5;
  this._stars.forEach((s,i)=>{
   const ds=this._stars.map((o,j)=>({j,d:(s.x-o.x)**2+(s.y-o.y)**2})).sort((a,b)=>a.d-b.d);
   ds.slice(1,3).forEach(({j})=>{
    const o=this._stars[j];
    ctx.beginPath();ctx.moveTo(s.x*W,s.y*H);ctx.lineTo(o.x*W,o.y*H);ctx.stroke();
   });
  });
  const cp=.6+.4*sin(t*1.5);
  const cg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,20*cp);
  cg.addColorStop(0,'rgba(100,200,255,'+.6*cp+')');cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(W/2,H/2,20*cp,0,PI*2);ctx.fill();
  ctx.fillStyle='rgba(200,240,255,.9)';ctx.font='10px monospace';ctx.fillText('◎',W/2-4,H/2+4);
  this._stars.forEach(s=>{
   const px2=s.x*W,py2=s.y*H;
   const pulse=.5+.5*sin(t*.8+s.ph);
   const [r,g,b]=hsv(.58+.1*sin(s.ph),.5,.5+.5*pulse);
   const sg=ctx.createRadialGradient(px2,py2,0,px2,py2,8);
   sg.addColorStop(0,'rgba('+[r,g,b].map(v=>v|0).join(',')+',.4)');sg.addColorStop(1,'transparent');
   ctx.fillStyle=sg;ctx.beginPath();ctx.arc(px2,py2,8,0,PI*2);ctx.fill();
   ctx.fillStyle='rgba('+[r,g,b].map(v=>v|0).join(',')+',.9)';
   ctx.font='10px monospace';ctx.fillText('✦',px2-5,py2+4);
   ctx.fillStyle='rgba(150,180,220,'+(.4+.3*pulse)+')';
   ctx.font='8px monospace';ctx.fillText('"'+s.n+'"',px2+8,py2+3);
  });
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.6)';
  ctx.fillText('☿ stellar weave · '+this._stars.length+' memories · session:47m',8,H-8);
 }
},

// ── NEW SCREENS ────────────────────────────────────────────────────────────

{id:'life-colony',title:'Life Colony',tag:'NEW',badge:'new',
 desc:'Conway\'s Game of Life where agent events seed new cell colonies. Different event types seed distinct patterns. Colonies compete for territory — alive cell density shows current agent load.',
 tags:['game-of-life','emergence','colonies','cellular-automata'],
 _g:null,_gw:0,
 draw(ctx,W,H,t){
  const sw=floor(W/4),sh=floor(H/4);
  if(!this._g||this._gw!==sw){
   this._gw=sw;this._g=new Uint8Array(sw*sh);
   for(let i=0;i<sw*sh;i++)this._g[i]=Math.random()<.32?1:0;
  }
  const g=this._g,ng=new Uint8Array(sw*sh);
  for(let y=0;y<sh;y++)for(let x=0;x<sw;x++){
   let n=0;
   for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    if(dx===0&&dy===0)continue;
    n+=g[((y+dy+sh)%sh)*sw+((x+dx+sw)%sw)];
   }
   const a=g[y*sw+x];ng[y*sw+x]=(a&&(n===2||n===3))||(!a&&n===3)?1:0;
  }
  if(ng.reduce((a,b)=>a+b,0)<sw*sh*.04)for(let i=0;i<sw*sh;i++)ng[i]=Math.random()<.3?1:0;
  this._g.set(ng);
  const id=ctx.createImageData(W,H);const dat=id.data;
  for(let y=0;y<sh;y++)for(let x=0;x<sw;x++){
   if(!ng[y*sw+x])continue;
   const hue=.5+.25*(x/sw)+.1*sin(t*.2+y*.3);
   const [r,g2,b]=hsv(hue%1,.7,.8);
   for(let dy=0;dy<4;dy++)for(let dx=0;dx<4;dx++){
    const px2=(x*4+dx),py2=(y*4+dy);
    if(px2<W&&py2<H)px(dat,(py2*W+px2)*4,r,g2,b);
   }
  }
  ctx.putImageData(id,0,0);
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.6)';
  ctx.fillText('☿ life colony · '+ng.reduce((a,b)=>a+b,0)+' cells alive · gen:'+(t*20|0),8,H-8);
 }
},

{id:'aurora-bands',title:'Aurora Bands',tag:'NEW',badge:'new',
 desc:'Horizontal aurora bands that undulate vertically — one band per event source. Band width and brightness react to source activity. Different sources glow different hues.',
 tags:['aurora','bands','undulating','serene'],
 draw(ctx,W,H,t){
  const bands=[
   {y:.20,h:.35,fr:.8, amp:.12,sp:.7, lb:'tools'},
   {y:.37,h:.55,fr:1.1,amp:.09,sp:1.0,lb:'memory'},
   {y:.52,h:.72,fr:.6, amp:.15,sp:.5, lb:'core'},
   {y:.67,h:.45,fr:.9, amp:.10,sp:.8, lb:'cron'},
   {y:.82,h:.08,fr:1.3,amp:.07,sp:1.2,lb:'aegis'},
  ];
  const id=ctx.createImageData(W,H);const dat=id.data;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
   const nx=x/W;
   let R=0,G=0,B=0;
   for(const b of bands){
    const cy2=b.y+b.amp*sin(nx*b.fr*8+t*b.sp);
    const dist=abs(y/H-cy2);
    const thick=.04+.02*sin(t*.4+b.h*10);
    if(dist<thick*3){
     const intensity=max(0,1-dist/(thick*3));
     const shimmer=.6+.4*sin(nx*20+t*2+b.y*30);
     const bright=intensity*intensity*shimmer;
     const [r,g,bv]=hsv(b.h+.05*sin(t*.3+nx*3),.7,bright*.9);
     R=max(R,r);G=max(G,g);B=max(B,bv);
    }
   }
   px(dat,(y*W+x)*4,R,G,B);
  }
  ctx.putImageData(id,0,0);
  ctx.font='8px monospace';
  bands.forEach(b=>{
   const [r,g,bv]=hsv(b.h,.6,.8);
   ctx.fillStyle='rgba('+[r,g,bv].map(v=>v|0).join(',')+',.7)';
   ctx.fillText(b.lb,W-55,b.y*H+4);
  });
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.6)';
  ctx.fillText('☿ aurora bands · 5 streams · reactive',8,H-8);
 }
},

{id:'waveform-scope',title:'Waveform Scope',tag:'NEW',badge:'new',
 desc:'Oscilloscope-style channels, one per event source. Tool calls create sharp spikes; memory creates smooth blobs; cron creates square waves. Like a logic analyzer for the agent\'s brain.',
 tags:['oscilloscope','channels','timeseries','diagnostic'],
 draw(ctx,W,H,t){
  ctx.fillStyle='#04060a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(40,60,80,.5)';ctx.lineWidth=.5;
  for(let x=0;x<W;x+=W/10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=H/6){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const channels=[
   {lb:'TOOLS', y:.15,h:.38,fn:(x,t)=>sin(x*4+t*2)*.6+sin(x*7+t*3)*.3},
   {lb:'MEMORY',y:.30,h:.55,fn:(x,t)=>sin(x*2+t*.8)*.4*(1+.5*sin(t*.5))},
   {lb:'CRON',  y:.47,h:.45,fn:(x,t)=>(sin(x*5+t)>.0?.6:-.2)},
   {lb:'AEGIS', y:.63,h:.08,fn:(x,t)=>.1*sin(x*20+t*5)},
   {lb:'DOCKER',y:.79,h:.62,fn:(x,t)=>sin(x*3+t*1.5)*.5*max(0,sin(t*.3))},
  ];
  channels.forEach(ch=>{
   const [r,g,b]=hsv(ch.h,.7,.8);
   ctx.strokeStyle='rgb('+[r,g,b].map(v=>v|0).join(',')+')';ctx.lineWidth=1;
   ctx.beginPath();
   const baseY=ch.y*H,amp=H*.07;
   for(let px2=0;px2<W;px2++){
    const vy=ch.fn(px2/W*8,t);
    const py=baseY-vy*amp;
    px2===0?ctx.moveTo(px2,py):ctx.lineTo(px2,py);
   }
   ctx.stroke();
   ctx.fillStyle='rgba('+[r,g,b].map(v=>v|0).join(',')+',.7)';
   ctx.font='8px monospace';ctx.fillText(ch.lb,4,ch.y*H-3);
  });
  const cxl=(t*.1*W)%W;
  ctx.strokeStyle='rgba(200,255,255,.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cxl,0);ctx.lineTo(cxl,H);ctx.stroke();
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.6)';
  ctx.fillText('☿ waveform scope · 5 channels · 20ms/div',8,H-8);
 }
},

{id:'lissajous-mind',title:'Lissajous Mind',tag:'NEW',badge:'new',
 desc:'Lissajous figures traced by the agent\'s "attention". Tool calls shift frequency ratio, creating different figure-8 and knot shapes. The fading trace shows recent path history.',
 tags:['lissajous','attention','trace','hypnotic'],
 _pts:null,
 draw(ctx,W,H,t){
  if(!this._pts)this._pts=[];
  ctx.fillStyle='rgba(4,6,10,.12)';ctx.fillRect(0,0,W,H);
  const fx=2+.5*sin(t*.07),fy=3+.5*sin(t*.11),phi=t*.4;
  const phase=t*.03;
  const cx2=W/2,cy2=H/2,rx=W*.42,ry=H*.42;
  const x=cx2+rx*sin(fx*phase+phi),y=cy2+ry*sin(fy*phase);
  this._pts.push({x,y});
  this._pts.forEach(p=>{ if(p.a===undefined)p.a=0; p.a++; });
  while(this._pts.length>400)this._pts.shift();
  this._pts.forEach((p,i)=>{
   const n=i/this._pts.length;
   const [r,g,b]=hsv((.55+.25*n+t*.02)%1,.8,n*.9);
   ctx.fillStyle='rgba('+[r,g,b].map(v=>v|0).join(',')+',.'+floor(n*8+1)+')';
   const sz=max(1,2*n);ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz);
  });
  const gg=ctx.createRadialGradient(x,y,0,x,y,8);
  gg.addColorStop(0,'rgba(200,255,255,.9)');gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(x,y,8,0,PI*2);ctx.fill();
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.6)';
  ctx.fillText('☿ lissajous · fx:'+fx.toFixed(2)+' fy:'+fy.toFixed(2)+' · attention trace',8,H-8);
 }
},

{id:'pulse-matrix',title:'Pulse Matrix',tag:'NEW · IMPROVES EXISTING',badge:'improved',
 desc:'A dot matrix where every point responds to compound interference waves. The screen breathes in layered rhythms. Security threats invert the field. Evolves the existing pulse system into a full-screen effect.',
 tags:['matrix','interference','dots','compound-rhythm'],
 draw(ctx,W,H,t){
  ctx.fillStyle='#02030a';ctx.fillRect(0,0,W,H);
  const STEP=6,cx2=W/2,cy2=H/2;
  for(let y=STEP/2;y<H;y+=STEP)for(let x=STEP/2;x<W;x+=STEP){
   const dx=(x-cx2)/cx2,dy=(y-cy2)/cy2;
   const dist=sqrt(dx*dx+dy*dy),angle=atan2(dy,dx);
   const w1=sin(dist*12-t*2.5);
   const w2=sin(dx*8+t*1.3);
   const w3=sin(dy*10-t*1.8);
   const w4=sin((dx+dy)*7+angle*3-t*2);
   const v=clamp((w1*.4+w2*.25+w3*.2+w4*.15+1)/2,0,1);
   const hue=.6+.15*sin(dist*2+t*.3)+.1*sin(angle*3);
   const [r,g,b]=hsv(hue,.75,v);
   const sz=max(.5,STEP*.4*v);
   ctx.fillStyle='rgba('+[r,g,b].map(v2=>v2|0).join(',')+',.'+floor(v*9+1)+')';
   ctx.beginPath();ctx.arc(x,y,sz,0,PI*2);ctx.fill();
  }
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(180,220,255,.5)';
  ctx.fillText('☿ pulse matrix · compound interference · reactive',8,H-8);
 }
},
];

// ── build cards ──────────────────────────────────────────────────────────────
const grid=document.getElementById('grid');
const selected=new Set();

function makeEl(tag,cls,txt){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(txt)el.textContent=txt;
  return el;
}

const cards=SCREENS.map((sc,si)=>{
  const card=makeEl('div','screen-card');

  // selected badge
  const badge=makeEl('div','sel-badge');badge.textContent='✓ SELECTED';card.appendChild(badge);

  // header
  const hdr=makeEl('div','screen-header');
  const dots=makeEl('div','dots');
  ['r','y','g'].forEach(c=>{const d=makeEl('div','dot '+c);dots.appendChild(d);});
  hdr.appendChild(dots);
  hdr.appendChild(makeEl('div','stitle','hermes-neurovision — '+sc.title.toLowerCase()));
  hdr.appendChild(makeEl('div','stag',sc.tag));
  card.appendChild(hdr);

  // canvas
  const canvas=document.createElement('canvas');
  canvas.width=480;canvas.height=200;
  card.appendChild(canvas);

  // desc
  const desc=makeEl('div','sdesc');
  const h3=makeEl('h3');
  h3.textContent=sc.title;
  if(sc.badge==='new'){const b=makeEl('span','nbadge');b.textContent='NEW';h3.appendChild(b);}
  else if(sc.badge==='improved'){const b=makeEl('span','ibadge');b.textContent='IMPROVES';h3.appendChild(b);}
  desc.appendChild(h3);
  desc.appendChild(makeEl('p','',sc.desc));
  const tagrow=makeEl('div','tagrow');
  sc.tags.forEach(t=>{const tg=makeEl('span','tag');tg.textContent=t;tagrow.appendChild(tg);});
  desc.appendChild(tagrow);
  card.appendChild(desc);

  card.addEventListener('click',()=>{
    if(selected.has(sc.id)){selected.delete(sc.id);card.classList.remove('selected');}
    else{selected.add(sc.id);card.classList.add('selected');}
    updateBar();
    fetch('/event',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'click',choice:sc.id,text:sc.title,selected:[...selected]})
    }).catch(()=>{});
  });

  grid.appendChild(card);
  return {sc,canvas};
});

function updateBar(){
  document.getElementById('bar-count').textContent=selected.size+' selected';
  document.getElementById('bar-names').textContent=[...selected].join(', ');
  document.getElementById('confirm').style.display=selected.size>0?'block':'none';
}

document.getElementById('confirm').addEventListener('click',()=>{
  fetch('/event',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type:'confirm',selected:[...selected]})}).catch(()=>{});
  const btn=document.getElementById('confirm');
  btn.textContent='✓ Confirmed!';btn.style.background='#4a8';
});

// ── animate ──────────────────────────────────────────────────────────────────
const offsets=SCREENS.map((_,i)=>i*3.7);
let t0=null;
function frame(ts){
  if(!t0)t0=ts;
  const t=(ts-t0)/1000;
  cards.forEach(({sc,canvas},i)=>{
    const rect=canvas.getBoundingClientRect();
    if(rect.bottom<-100||rect.top>window.innerHeight+100)return;
    sc.draw(canvas.getContext('2d'),480,200,t+offsets[i]);
  });
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
