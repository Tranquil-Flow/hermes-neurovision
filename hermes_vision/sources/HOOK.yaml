name: hermes-vision
description: Emits agent lifecycle events to the Hermes Vision neurovisualizer
events:
  - agent:start
  - agent:step
  - agent:end
  - session:start
  - session:reset
  - command:*

# Auto-launch configuration (optional):
# Create ~/.hermes/vision/config.json with:
# {
#   "auto_launch": true,          # Enable auto-launch on agent:start from cron
#   "preferred_terminal": null,   # Override terminal detection ("iterm2", "terminal", "tmux", etc.)
#   "launch_command": null,       # Custom command to run (overrides default)
#   "auto_exit": true,            # Pass --auto-exit flag (exit after 30s idle)
#   "show_logs": true             # Pass --logs flag
# }
#
# Auto-launch only triggers on agent:start events with source="cron" or trigger="automated"
# Includes duplicate prevention - won't launch if hermes-vision already running
